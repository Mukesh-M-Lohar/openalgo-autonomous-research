name: "NIFTY Intraday + Swing Research"
description: "Discover robust intraday and swing strategies for NIFTY and BANKNIFTY"

trading_styles:
  - intraday
  - swing
  - btst

style_overrides:
  intraday:
    max_hold_bars: 75
    forced_exit_time: "15:15"
    product_type: "MIS"
    min_trades: 200
  btst:
    min_hold_bars: 50
    max_hold_bars: 150
    product_type: "CNC"
  swing:
    min_hold_bars: 10
    max_hold_bars: 360
    product_type: "CNC"

data:
  openalgo:
    host: "http://127.0.0.1:5000"
    api_key: "${OPENALGO_API_KEY}"
    source: "db"
  symbols:
    - symbol: "NIFTY"
      exchange: "NSE"
    - symbol: "BANKNIFTY"
      exchange: "NSE"
  timeframes:
    - "5m"
    - "15m"
    - "1h"
    - "1d"
  start_date: "2020-01-01"
  end_date: "2025-01-01"
  train_pct: 0.7
  validation_pct: 0.15
  test_pct: 0.15

generation:
  mode: "random"
  target_count: 50000
  max_conditions_per_entry: 3
  allow_short: false
  indicator_categories:
    - trend
    - momentum
    - volatility
    - volume
  multi_timeframe: true

filters:
  fast_reject:
    max_complexity: 5
    min_indicators: 1
  backtest:
    min_trades: 30
    min_sharpe: 1.0
    max_drawdown: 0.25
    min_profit_factor: 1.3
  validation:
    max_oos_sharpe_decay: 0.40
    min_walk_forward_consistency: 0.6
    monte_carlo_confidence: 0.95
    param_stability_tolerance: 0.25

evolution:
  enabled: true
  generations: 5
  population_size: 200
  mutation_rate: 0.3
  crossover_rate: 0.5
  elitism_pct: 0.1
  tournament_size: 5

ranking:
  mode: "robustness_first"
  objectives:
    - metric: "sharpe"
      weight: 0.30
      direction: "maximize"
    - metric: "sortino"
      weight: 0.20
      direction: "maximize"
    - metric: "max_drawdown_pct"
      weight: 0.20
      direction: "minimize"
    - metric: "profit_factor"
      weight: 0.15
      direction: "maximize"
    - metric: "cagr"
      weight: 0.15
      direction: "maximize"
  export_top_n: 20
  export_per_category: 5

execution:
  max_workers: null  # auto-detect CPU
  chunk_size: 200

cost_model:
  commission_pct: 0.03
  slippage_pct: 0.02
  min_commission: 20.0

output:
  storage: "csv"
  base_dir: "./data/runs"
  export_dir: "./data/exports"
  save_all_candidates: true
