name: Multi-Symbol High Frequency Reversion Intraday
description: High-frequency intraday mean reversion across the top 5 liquid stock
  heavyweights on 5m charts
trading_styles:
- intraday
style_overrides:
  intraday:
    max_hold_bars: 150
    forced_exit_time: '15:15'
    product_type: MIS
    min_trades: 300
data:
  openalgo:
    host: http://127.0.0.1:5000
    api_key: ${OPENALGO_API_KEY}
    source: db
  symbols:
  - symbol: RELIANCE
    exchange: NSE
  - symbol: TCS
    exchange: NSE
  - symbol: INFOSYS
    exchange: NSE
  - symbol: HDFCBANK
    exchange: NSE
  - symbol: ICICIBANK
    exchange: NSE
  timeframes:
  - 5m
  start_date: '2021-01-01'
  end_date: '2026-06-01'
  train_pct: 0.7
  validation_pct: 0.15
  test_pct: 0.15
generation:
  mode: guided
  target_count: 50000
  max_conditions_per_entry: 3
  allow_short: true
  indicator_categories:
  - volatility
  - momentum
  multi_timeframe: false
filters:
  fast_reject:
    max_complexity: 4
    min_indicators: 1
  backtest:
    min_trades: 300
    min_sharpe: 1.2
    max_drawdown: 0.15
    min_profit_factor: 1.4
    min_win_rate: 0.45
    min_cagr: 0.15
  validation:
    max_oos_sharpe_decay: 0.3
    min_walk_forward_consistency: 0.7
    monte_carlo_confidence: 0.95
    param_stability_tolerance: 0.18
evolution:
  enabled: true
  generations: 6
  population_size: 400
  mutation_rate: 0.3
  crossover_rate: 0.5
  elitism_pct: 0.1
  tournament_size: 4
ranking:
  mode: robustness_first
  objectives:
  - metric: sharpe
    weight: 0.35
    direction: maximize
  - metric: sortino
    weight: 0.2
    direction: maximize
  - metric: max_drawdown_pct
    weight: 0.25
    direction: minimize
  - metric: profit_factor
    weight: 0.2
    direction: maximize
  export_top_n: 20
  export_per_category: 4
cost_model:
  commission_pct: 0.03
  slippage_pct: 0.02
  min_commission: 20.0
output:
  storage: csv
  base_dir: ./data/runs
  export_dir: ./data/exports
  save_all_candidates: true
