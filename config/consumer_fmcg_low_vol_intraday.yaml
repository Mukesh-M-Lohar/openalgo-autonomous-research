name: Consumer FMCG Low Vol Intraday
description: Steady intraday trend-following in defensive, low-volatility FMCG stocks
  (HINDUNILVR, ITC, BRITANNIA)
trading_styles:
- intraday
style_overrides:
  intraday:
    max_hold_bars: 75
    forced_exit_time: '15:15'
    product_type: MIS
    min_trades: 150
data:
  openalgo:
    host: http://127.0.0.1:5000
    api_key: ${OPENALGO_API_KEY}
    source: db
  symbols:
  - symbol: HINDUNILVR
    exchange: NSE
  - symbol: ITC
    exchange: NSE
  - symbol: BRITANNIA
    exchange: NSE
  timeframes:
  - 15m
  start_date: '2021-01-01'
  end_date: '2026-06-01'
  train_pct: 0.7
  validation_pct: 0.15
  test_pct: 0.15
generation:
  mode: guided
  target_count: 30000
  max_conditions_per_entry: 3
  allow_short: true
  indicator_categories:
  - trend
  - momentum
  multi_timeframe: false
filters:
  fast_reject:
    max_complexity: 4
    min_indicators: 1
  backtest:
    min_trades: 150
    min_sharpe: 1.1
    max_drawdown: 0.12
    min_profit_factor: 1.35
    min_win_rate: 0.45
    min_cagr: 0.1
  validation:
    max_oos_sharpe_decay: 0.25
    min_walk_forward_consistency: 0.7
    monte_carlo_confidence: 0.95
    param_stability_tolerance: 0.18
evolution:
  enabled: true
  generations: 5
  population_size: 250
  mutation_rate: 0.25
  crossover_rate: 0.5
  elitism_pct: 0.12
  tournament_size: 3
ranking:
  mode: robustness_first
  objectives:
  - metric: sharpe
    weight: 0.4
    direction: maximize
  - metric: max_drawdown_pct
    weight: 0.3
    direction: minimize
  - metric: profit_factor
    weight: 0.2
    direction: maximize
  - metric: cagr
    weight: 0.1
    direction: maximize
  export_top_n: 15
  export_per_category: 3
cost_model:
  commission_pct: 0.03
  slippage_pct: 0.015
  min_commission: 20.0
output:
  storage: csv
  base_dir: ./data/runs
  export_dir: ./data/exports
  save_all_candidates: true
