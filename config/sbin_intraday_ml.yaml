name: SBIN Intraday ML Research
description: Production-grade intraday research configuration with Machine Learning Trade Quality Classifier (TQC) enabled.
trading_styles:
  - intraday

style_overrides:
  intraday:
    max_hold_bars: 75
    forced_exit_time: '15:15'
    product_type: MIS
    min_trades: 15

data:
  openalgo:
    host: http://127.0.0.1:5000
    api_key: ${OPENALGO_API_KEY}
    source: db
  symbols:
    - symbol: SBIN
      exchange: NSE
  timeframes:
    - 15m
    - 1h
  start_date: '2026-01-01'
  end_date: '2026-06-25'
  train_pct: 0.70
  validation_pct: 0.15
  test_pct: 0.15

generation:
  mode: random
  target_count: 200
  max_conditions_per_entry: 2
  allow_short: true
  indicator_categories:
    - trend
    - momentum

filters:
  backtest:
    min_trades: 15
    min_sharpe: 0.5
    max_drawdown: 0.30
    min_profit_factor: 1.1

evolution:
  enabled: true
  generations: 3
  population_size: 50
  mutation_rate: 0.3
  crossover_rate: 0.5

ranking:
  mode: robustness_first
  export_top_n: 5

machine_learning:
  enabled: true
  dataset:
    source: generated_trades
    rolling_windows: [5, 10, 20, 50]
    features:
      technical: true
      candle: true
      volatility: true
      volume: true
      time: true
      session: true
      gap: true
      rolling: true
  labels:
    type: meta_labeling
    threshold: 0.0  # Meta-labels successful trades (PnL > 0)
  models:
    - lightgbm
    - xgboost
    - random_forest
  tuning:
    enabled: true
    trials: 20
    cv_folds: 3
    objectives:
      - accuracy
  explainability:
    shap: true
    permutation_importance: true
    feature_importance: true
  deployment:
    confidence_threshold: 0.65
