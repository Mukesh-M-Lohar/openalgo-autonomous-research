name: "Default Research"
description: "Default configuration for quick testing"

trading_styles:
  - intraday
  - swing

data:
  openalgo:
    host: "http://127.0.0.1:5000"
    api_key: "${OPENALGO_API_KEY}"
    source: "db"
  symbols:
    - symbol: "NIFTY"
      exchange: "NSE"
  timeframes:
    - "15m"
    - "1h"
  start_date: "2022-01-01"
  end_date: "2024-12-31"
  train_pct: 0.7
  validation_pct: 0.15
  test_pct: 0.15

generation:
  mode: "random"
  target_count: 10000
  max_conditions_per_entry: 3
  allow_short: false
  indicator_categories:
    - trend
    - momentum
  multi_timeframe: false

filters:
  fast_reject:
    max_complexity: 4
    min_indicators: 1
  backtest:
    min_trades: 20
    min_sharpe: 0.8
    max_drawdown: 0.30
    min_profit_factor: 1.2

evolution:
  enabled: true
  generations: 3
  population_size: 100
  mutation_rate: 0.3
  crossover_rate: 0.5
  elitism_pct: 0.1
  tournament_size: 3

ranking:
  mode: "robustness_first"
  objectives:
    - metric: "sharpe"
      weight: 0.35
      direction: "maximize"
    - metric: "profit_factor"
      weight: 0.25
      direction: "maximize"
    - metric: "max_drawdown_pct"
      weight: 0.25
      direction: "minimize"
    - metric: "cagr"
      weight: 0.15
      direction: "maximize"
  export_top_n: 10
  export_per_category: 3

execution:
  max_workers: null
  chunk_size: 100

cost_model:
  commission_pct: 0.03
  slippage_pct: 0.02
  min_commission: 20.0

output:
  storage: "csv"
  base_dir: "./data/runs"
  export_dir: "./data/exports"
  save_all_candidates: true
