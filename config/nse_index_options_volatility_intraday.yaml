name: NSE Index Options Volatility Intraday
description: Volatility breakout and expansion models for Index Option buyers/sellers
  on NIFTY & BANKNIFTY
trading_styles:
- intraday
style_overrides:
  intraday:
    max_hold_bars: 75
    forced_exit_time: '15:15'
    product_type: MIS
    min_trades: 200
data:
  openalgo:
    host: http://127.0.0.1:5000
    api_key: ${OPENALGO_API_KEY}
    source: db
  symbols:
  - symbol: NIFTY
    exchange: NSE
  - symbol: BANKNIFTY
    exchange: NSE
  timeframes:
  - 5m
  - 15m
  start_date: '2021-01-01'
  end_date: '2026-06-01'
  train_pct: 0.7
  validation_pct: 0.15
  test_pct: 0.15
generation:
  mode: guided
  target_count: 50000
  max_conditions_per_entry: 3
  allow_short: true
  indicator_categories:
  - volatility
  - volume
  - momentum
  multi_timeframe: true
filters:
  fast_reject:
    max_complexity: 4
    min_indicators: 1
  backtest:
    min_trades: 200
    min_sharpe: 1.3
    max_drawdown: 0.25
    min_profit_factor: 1.45
    min_win_rate: 0.4
    min_cagr: 0.2
  validation:
    max_oos_sharpe_decay: 0.35
    min_walk_forward_consistency: 0.65
    monte_carlo_confidence: 0.95
    param_stability_tolerance: 0.2
evolution:
  enabled: true
  generations: 6
  population_size: 400
  mutation_rate: 0.3
  crossover_rate: 0.5
  elitism_pct: 0.1
  tournament_size: 5
ranking:
  mode: robustness_first
  objectives:
  - metric: sharpe
    weight: 0.3
    direction: maximize
  - metric: sortino
    weight: 0.2
    direction: maximize
  - metric: max_drawdown_pct
    weight: 0.25
    direction: minimize
  - metric: profit_factor
    weight: 0.15
    direction: maximize
  - metric: cagr
    weight: 0.1
    direction: maximize
  export_top_n: 20
  export_per_category: 4
cost_model:
  commission_pct: 0.04
  slippage_pct: 0.03
  min_commission: 20.0
output:
  storage: csv
  base_dir: ./data/runs
  export_dir: ./data/exports
  save_all_candidates: true
