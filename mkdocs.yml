site_name: OpenAlgo Quant Research Engine
site_description: Autonomous strategy discovery, validation, and export
site_url: https://github.com/Mukesh-M-Lohar/openalgo-autonomous-research.git
docs_dir: docs

repo_url: https://github.com/Mukesh-M-Lohar/openalgo-autonomous-research.git
repo_name: openalgo-autonomous-research

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.path
    - toc.integrate
    - search.highlight
    - content.code.copy

markdown_extensions:
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started.md
      - Quick Start: quick-start.md
  - Developer Guide:
      - Setup: developer-guide.md
      - Contributing: contributing.md
      - Low-Level Design: low-level-design.md
  - API Reference:
      - REST Endpoints: api/api-reference.md
      - Python SDK Reference: guides/openalgo-sdk-reference.md
  - Guides:
      - Configuration: guides/configuration.md
      - Adding Indicators: guides/adding-indicators.md
      - Machine Learning Guide: guides/machine-learning.md
      - Python Strategy Guide: guides/python-guide.md
      - Strategy Management: guides/strategy-management.md
      - Understanding Rejections: guides/rejections.md
  - Research Dashboard: dashboard.html
