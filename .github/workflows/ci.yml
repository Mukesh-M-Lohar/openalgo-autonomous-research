name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Unit & Integration Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" || pip install numpy pandas pydantic pydantic-settings pyyaml fastapi uvicorn typer jinja2 httpx pytest pytest-cov

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=src/quant_engine --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: src

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  integration:
    name: Integration Test (Full Pipeline)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install numpy pandas pydantic pydantic-settings pyyaml fastapi uvicorn typer jinja2 httpx pytest

      - name: Run integration test
        run: |
          python -m pytest tests/test_pipeline/ -v --tb=long
        env:
          PYTHONPATH: src

  api-test:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install numpy pandas pydantic pydantic-settings pyyaml fastapi uvicorn typer jinja2 httpx pytest httpx

      - name: Start API server and test
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from fastapi.testclient import TestClient
          from quant_engine.api.routes import create_app

          app = create_app()
          client = TestClient(app)

          # Health check
          r = client.get('/health')
          assert r.status_code == 200
          assert r.json()['status'] == 'ok'

          # List runs (empty)
          r = client.get('/research/runs')
          assert r.status_code == 200

          # 404 for unknown run
          r = client.get('/research/status/nonexistent')
          assert r.status_code == 404

          print('API smoke tests passed!')
          "
        env:
          PYTHONPATH: src

  build-check:
    name: Package Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify wheel
        run: |
          pip install dist/*.whl
          python -c "import quant_engine; print(f'Version: {quant_engine.__version__}')"
